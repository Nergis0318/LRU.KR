name: lru-kr

services:
  lru-kr_server:
    image: ghcr.io/nergis0318/lru.kr:latest
    container_name: lru-kr_server
    ports:
      - 2001:2001
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
    healthcheck:
      test: curl http://0.0.0.0:2001 || exit 1
    restart: always
  lru-kr_db:
    image: docker.io/valkey/valkey-bundle:alpine
    container_name: lru-kr_db
    labels:
      io.containers.autoupdate: image
    ports:
      - 26379:6379
    volumes:
      - ${DB_LOCATION}:/data
    env_file:
      - .env
    environment:
      TZ: Asia/Seoul
      REDIS_ARGS: --requirepass ${DB_PASSWORD}
    healthcheck:
      test: valkey-cli ping || exit 1
    restart: always
