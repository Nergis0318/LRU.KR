<!DOCTYPE html>
<html lang="kr">
<head>
    <meta charset="utf-8" />
    <title>링크를 더 짧고, 더 간결하게. LRU</title>
    <meta content="링크를 더 짧고, 더 간결하게. LRU.KR" name="description" />
    <meta content="width=device-width, initial-scale=1.0" name="viewport" />

    <!-- Tailwind CSS for modern styling -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- QR Code Generator Library -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcode/1.5.1/qrcode.min.js"></script>

    <!-- Google Fonts for a clean, modern look -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;700;900&display=swap" rel="stylesheet">

    <script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6290342471056589"
     crossorigin="anonymous"></script>

    <!-- Custom Styles and Font (Pretendard) -->
    <style>
        @font-face {
            font-family: "Pretendard Variable";
            src: url("https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.8/dist/web/variable/pretendardvariable-dynamic-subset.css");
            font-display: swap;
        }
        body {
            font-family: "Pretendard Variable", "Inter", -apple-system, BlinkMacSystemFont, system-ui, sans-serif;
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }
        /* Custom Accent Color */
        .accent-bg { background-color: #aaaaff; }
        .accent-bg-hover:hover { background-color: #9999f5; }
        .accent-text { color: #aaaaff; }
        .accent-ring:focus {
            --tw-ring-color: #aaaaff;
        }
        .peer:checked ~ .custom-checkbox-visual {
            background-color: #aaaaff;
            border-color: #aaaaff;
        }
        .peer:checked ~ .custom-checkbox-visual > svg {
            display: block;
        }
    </style>
</head>

<body class="bg-slate-900 text-slate-300 flex flex-col items-center justify-between min-h-screen p-4">

    <!-- Notification popup to replace alerts -->
    <div id="notification" class="fixed top-5 right-5 text-white px-4 py-2 rounded-lg shadow-lg opacity-0 transition-all duration-300 pointer-events-none z-50">
        <span id="notification-message"></span>
    </div>

    <!-- Header Section -->
    <header class="w-full max-w-6xl mx-auto flex justify-between items-center py-4">
        <a href="https://LRU.KR" class="text-2xl sm:text-3xl font-black tracking-tighter text-white hover:opacity-80 transition">LRU</a>
        <nav>
            <a href="https://LRU.KR/docs" class="text-slate-400 hover:text-white transition-colors">Docs</a>
        </nav>
    </header>

    <!-- Main Content -->
    <main class="flex flex-col items-center justify-center w-full flex-1 text-center px-4">
        <div class="w-full max-w-lg flex flex-col gap-6">

            <!-- Result Display Area -->
            <div id="result-container" class="hidden flex flex-col items-center gap-6">
                <div id="short-link-display" class="w-full p-4 bg-slate-800 rounded-lg flex items-center justify-between gap-4">
                    <a href="#" id="short-link-url" target="_blank" class="text-lg font-bold accent-text hover:underline truncate"></a>
                    <button id="copy-button" class="px-3 py-1.5 text-sm font-semibold bg-slate-700 hover:bg-slate-600 rounded-md transition-colors">복사하기</button>
                </div>
                <div id="qr-code-container" class="bg-white p-2 rounded-lg shadow-lg flex flex-col items-center gap-2">
                    <canvas id="qr-code-canvas"></canvas>
                    <button id="download-qr-button" class="px-3 py-1.5 text-sm font-semibold bg-slate-700 hover:bg-slate-600 rounded-md transition-colors text-white">
                        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 inline-block mr-1" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" />
                        </svg>
                        QR 다운로드
                    </button>
                </div>
            </div>

            <!-- URL Shortener Form -->
            <form id="shorten-form" class="w-full flex flex-col gap-5">
                <h1 class="text-3xl md:text-4xl font-bold text-white mb-2">링크를 더 짧고, 더 간결하게</h1>
                <p class="text-slate-400 mb-4">URL을 붙여넣고 원하는 방식으로 단축해보세요.</p>

                <div class="relative">
                    <input id="url" name="url" placeholder="https://example.com" type="url" required class="w-full px-5 py-4 bg-slate-800/80 border border-slate-700 rounded-lg focus:ring-2 accent-ring focus:outline-none transition-all placeholder-slate-500 text-white" />
                </div>

                <div class="flex justify-center items-center gap-4 sm:gap-6">
                    <label class="flex items-center gap-2 cursor-pointer text-sm">
                        <input type="checkbox" id="emoji-option" name="shorten-type" value="emoji" class="peer sr-only" />
                        <div class="custom-checkbox-visual w-5 h-5 border-2 border-slate-600 rounded-md flex items-center justify-center transition-all">
                           <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-slate-900 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                        </div>
                        <span>이모지로 단축하기 🐣</span>
                    </label>
                    <label class="flex items-center gap-2 cursor-pointer text-sm">
                        <input type="checkbox" id="number-option" name="shorten-type" value="number" class="peer sr-only" />
                        <div class="custom-checkbox-visual w-5 h-5 border-2 border-slate-600 rounded-md flex items-center justify-center transition-all">
                            <svg xmlns="http://www.w3.org/2000/svg" class="h-3 w-3 text-slate-900 hidden" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="4"><path stroke-linecap="round" stroke-linejoin="round" d="M5 13l4 4L19 7" /></svg>
                        </div>
                        <span>숫자로 단축하기 🔢</span>
                    </label>
                </div>

                <button type="submit" class="w-full py-4 accent-bg accent-bg-hover text-slate-900 font-bold rounded-lg transition-colors disabled:bg-slate-700 disabled:text-slate-500 disabled:cursor-not-allowed text-base">
                    단축하기 🚀
                </button>
            </form>
        </div>
    </main>

    <!-- Footer Section -->
    <footer class="w-full max-w-6xl mx-auto text-center py-6 relative group">
        <p class="text-sm text-slate-500">© A85LABS / 커스텀 단축 URL 문의는 me@nergis.dev</p>
        <div class="absolute bottom-full left-1/2 -translate-x-1/2 mb-2 w-max bg-slate-700 text-white text-xs rounded-md px-3 py-1.5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none">
            Python 3.13 / Alpine 3.21
        </div>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            // --- DOM Element Selection ---
            const form = document.getElementById("shorten-form");
            const urlInput = document.getElementById("url");
            const resultContainer = document.getElementById("result-container");
            const shortLinkDisplay = document.getElementById("short-link-display");
            const shortLinkUrlElement = document.getElementById("short-link-url");
            const qrCodeContainer = document.getElementById("qr-code-container");
            const qrCodeCanvas = document.getElementById("qr-code-canvas");
            const copyButton = document.getElementById("copy-button");
            const downloadQrButton = document.getElementById("download-qr-button"); // New: QR download button
            const emojiOption = document.getElementById("emoji-option");
            const numberOption = document.getElementById("number-option");
            const checkboxes = [emojiOption, numberOption];
            const submitButton = form.querySelector('button[type="submit"]');

            // --- Notification System ---
            const notification = document.getElementById('notification');
            const notificationMessage = document.getElementById('notification-message');
            let notificationTimeout;

            function showNotification(message, isError = true) {
                clearTimeout(notificationTimeout);
                notificationMessage.textContent = message;

                notification.classList.remove('bg-red-600', 'bg-green-500', 'opacity-0');
                notification.classList.add(isError ? 'bg-red-600' : 'bg-green-500', 'opacity-100');


                notificationTimeout = setTimeout(() => {
                    notification.classList.add('opacity-0');
                    notification.classList.remove('opacity-100');
                }, 3000);
            }

            // --- Checkbox Single Selection Logic ---
            checkboxes.forEach((checkbox) => {
                checkbox.addEventListener("change", () => {
                    if (checkbox.checked) {
                        checkboxes.forEach((otherCheckbox) => {
                            if (otherCheckbox !== checkbox) {
                                otherCheckbox.checked = false;
                            }
                        });
                    }
                });
            });

            // --- QR Code Generation ---
            function generateQRCode(urlToEncode) {
                if (!urlToEncode) {
                    qrCodeContainer.style.display = "none";
                    return;
                }
                // Update to show the container
                qrCodeContainer.style.display = "flex";
                QRCode.toCanvas(qrCodeCanvas, urlToEncode, {
                    width: 160,
                    margin: 1,
                    errorCorrectionLevel: "H",
                    color: {
                        dark: "#1e293b", // slate-800
                        light: "#ffffff"
                    }
                }, (error) => {
                    if (error) {
                        console.error("QR Code generation error:", error);
                        showNotification("QR 코드 생성에 실패했습니다.");
                        qrCodeContainer.style.display = "none";
                    } else {
                        qrCodeContainer.style.display = "flex";
                    }
                });
            }
            
            // --- Copy to Clipboard ---
            copyButton.addEventListener('click', () => {
                const tempInput = document.createElement('input');
                tempInput.value = shortLinkUrlElement.href;
                document.body.appendChild(tempInput);
                tempInput.select();
                try {
                    document.execCommand('copy');
                    showNotification('복사되었습니다!', false);
                    copyButton.textContent = 'Copied!';
                    setTimeout(() => { copyButton.textContent = '복사하기'; }, 2000);
                } catch (err) {
                    console.error('Failed to copy: ', err);
                    showNotification('복사에 실패했습니다.');
                }
                document.body.removeChild(tempInput);
            });

            // --- QR Code Download Logic ---
            downloadQrButton.addEventListener('click', () => {
                const dataURL = qrCodeCanvas.toDataURL('image/png');
                const link = document.createElement('a');
                link.download = 'lru_qr_code.png';
                link.href = dataURL;
                document.body.appendChild(link);
                link.click();
                document.body.removeChild(link);
            });


            // --- Form Submission Handler ---
            form.addEventListener("submit", async (e) => {
                e.preventDefault();
                const originalUrl = urlInput.value;

                if (!originalUrl || !originalUrl.includes("://")) {
                    showNotification("유효한 URL 형식이어야 합니다 (예: protocol://example.com)");
                    return;
                }

                submitButton.disabled = true;
                submitButton.textContent = "처리 중...";
                resultContainer.classList.add('hidden'); // Hide previous result

                const useEmoji = emojiOption.checked;
                const useNumber = numberOption.checked;
                let endpoint = "/shorten";
                if (useEmoji) endpoint = "/shorten/emoji";
                else if (useNumber) endpoint = "/shorten/number";

                try {
                    const response = await fetch(endpoint, {
                        method: "POST",
                        headers: { "Content-Type": "application/json" },
                        body: JSON.stringify({ url: originalUrl }),
                    });

                    if (response.ok) {
                        const data = await response.json();
                        const shortenedURL = data.short_link;

                        shortLinkUrlElement.href = shortenedURL;
                        shortLinkUrlElement.textContent = shortenedURL.replace(/^https?:\/\//, "");

                        resultContainer.classList.remove('hidden');
                        generateQRCode(shortenedURL);

                    } else {
                        const errorText = await response.text();
                        console.error("Shortening failed:", response.status, errorText);
                        showNotification("URL 단축에 실패했습니다. 잠시 후 다시 시도해주세요.");
                    }
                } catch (error) {
                    console.error("Request error:", error);
                    showNotification("네트워크 오류가 발생했습니다.");
                } finally {
                    submitButton.disabled = false;
                    submitButton.textContent = "단축하기 🚀";
                }
            });
        });
    </script>
</body>
</html>
