<!DOCTYPE html>
<html lang="kr" xml:lang="kr">

<head>
    <meta charset="utf-8">
    <title>🔗 ➡️ 💨</title>
    <meta content="링크를 더 짧게, sqla.re" name="description">
    <meta content="width=device-width, initial-scale=1.0" name="viewport">
    <style>
        @font-face {
            font-family: "Pretendard Variable";
            src: url("https://cdnjs.cloudflare.com/ajax/libs/pretendard/1.3.8/variable/pretendardvariable-dynamic-subset.css");
            font-display: auto;
        }

        body {
            font-family: "Pretendard Variable", -apple-system, BlinkMacSystemFont, system-ui, Roboto, "Helvetica Neue", "Segoe UI", "Apple SD Gothic Neo", "Noto Sans KR", "Malgun Gothic", "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol", sans-serif;
            background-color: #141923;
            color: #fff;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            width: 100vw;
            height: 100vh;
            text-align: center;
        }

        header {
            width: 100vw;
            height: 10%;
            display: flex;
            flex-direction: row;
            align-items: center;
            justify-content: left;
            padding: 0;
        }

        header h1 {
            font-weight: 900;
            width: 20%;
            margin-left: 20px;
            font-size: 20pt;
        }

        header ul {
            display: flex;
            width: 80%;
            flex-direction: row;
            align-items: center;
            justify-content: right;
            margin-right: 20px;
        }

        header ul li {
            margin: 0 5px;
        }

        header ul li a {
            color: white;
        }

        main {
            width: 100vw;
            height: 90%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
        }

        h1,
        h1 a {
            color: #fff;
        }

        label {
            display: block;
            margin-bottom: 10px;
        }

        input[type="url"] {
            width: 80%;
            height: 20px;
            padding: 10px;
            margin-bottom: 10px;
            border: 1px solid #ccc;
            border-radius: 10px;
        }

        button[type="submit"] {
            background-color: #2F3646;
            color: #fff;
            border: none;
            padding: 10px 20px;
            border-radius: 10px;
            cursor: pointer;
        }

        button[type="submit"]:hover {
            background-color: #2A313F;
        }

        #short-link {
            display: none;
            margin-top: 20px;
        }

        #short-link p {
            font-weight: bold;
        }

        #short-link-url {
            color: #007bff;
            text-decoration: none;
        }

        #short-link-url:hover {
            text-decoration: underline;
        }

        h2 {
            margin-top: 20px;
        }

        ul {
            list-style-type: none;
            padding: 0;
        }

        li {
            margin: 10px 0;
        }

        a {
            color: #fff !important;
            text-decoration: none;
        }

        a:hover {
            text-decoration: underline;
        }

        div img {
            width: 128px;
            height: 128px;
            border-radius: 25px;
        }

        @media (max-width: 768px) {
            header h1 {
                font-size: 14pt;
            }
        }

        @media (min-width: 769px) {
            body {
                font-size: 130%;
            }
        }

        footer {
            position: fixed;
            bottom: 0%;
        }

        #info-popup {
            display: none;
            position: fixed;
            bottom: 2.5%;
            padding: 10px;
            border-radius: 10px;
        }
    </style>
    <script async crossorigin="anonymous"
            src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-6290342471056589"></script>
</head>

<body>
<header>
    <a href="https://sqla.re">
        <h1>sqla.re</h1>
    </a>
    <a href="https://sqla.re/docs">
        <h1>Docs</h1>
    </a>
</header>
<main>
    <h1><a href="" id="short-link-url">sqla.re</a></h1>
    <form action="/shorten" method="post">
        <label for="url">URL</label>
        <input id="url" name="url" placeholder="https://example.com" type="url">
        <button type="submit">하기 🚀</button>
        <br/><br/>
        <div id="qr-code-container"></div>
    </form>
    <div>
        <iframe frameborder="0" height="240" scrolling="no" src="https://snowflake.torproject.org/embed.html"
                width="320"></iframe>
    </div>
    <footer>
        <label style="font-size: 15px;">© Sqlare / 커스텀 단축 URL 문의는 me@nergis.dev</label>
    </footer>
    <div id="info-popup">
        <p style="font-size: 12pt;">Python 3.13.3 / Alpine 3.21.3</p>
    </div>
</main>
<script>
    const footer = document.querySelector('footer');
    const infoPopup = document.getElementById('info-popup');
    const form = document.querySelector('form');
    const shortLinkUrl = document.getElementById('short-link-url');
    const qrCodeContainer = document.getElementById('qr-code-container');

    footer.addEventListener('mouseover', () => {
        infoPopup.style.display = 'block';
    });

    footer.addEventListener('mouseout', () => {
        infoPopup.style.display = 'none';
    });

    const updateQRCode = async () => {
        const shortenedURL = shortLinkUrl.href;
        const data = form.querySelector('#url').value;

        try {
            const qrCodeResponse = await fetch('/shorten_qr_code', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({data}),
            });

            if (qrCodeResponse.ok) {
                const qrCodeData = await qrCodeResponse.text();
                qrCodeContainer.innerHTML = '';
                qrCodeContainer.innerHTML = qrCodeData;
            } else {
                qrCodeContainer.style.display = 'none';
                alert('QR 코드를 생성하는 동안 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
            }
        } catch (error) {
            qrCodeContainer.style.display = 'none';
            alert('QR 코드를 생성하는 동안 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        }
    };

    form.addEventListener('submit', async (e) => {
        e.preventDefault();
        const url = form.querySelector('#url').value;

        try {
            const response = await fetch('/shorten', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify({url}),
            });

            if (response.ok) {
                const data = await response.json();
                const shortenedURL = data.short_link;
                shortLinkUrl.href = shortenedURL;
                shortLinkUrl.textContent = shortenedURL.replace('https://', '');
                qrCodeContainer.style.display = 'block';
                updateQRCode();
            } else {
                qrCodeContainer.style.display = 'none';
                alert('URL을 줄이는 동안 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
            }
        } catch (error) {
            qrCodeContainer.style.display = 'none';
            alert('URL을 줄이는 동안 오류가 발생했습니다. 잠시 후 다시 시도해주세요.');
        }
    });
</script>
</body>

</html>
